name: twg
services:
  twg_cli:
    container_name: twg2
    build:
      context: .
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      mynet:
        ipv4_address: 172.22.0.13
    ports:
      - 51822:51822/udp
    tty: true
    restart: always

networks:
  mynet:
    name: mynet
    driver: bridge
    ipam:
      config:
      - subnet: 172.22.0.0/24
        gateway: 172.22.0.1