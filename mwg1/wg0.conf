# mwg1 - ruvds
[Interface]
PrivateKey = 
Address = 10.13.14.1/24
ListenPort = 51830
Table = off

PostUp = ip route replace 172.22.0.0/24 dev %i
PostUp = ip route replace 192.168.88.0/24 dev %i
PostUp = ip rule add from 10.13.14.3/32 table 200 2>/dev/null || true
PostUp = ip route replace default dev %i table 200

PostUp = iptables -I FORWARD 1 -i %i -o %i -s 172.22.0.0/24 -d 192.168.88.0/24 -j ACCEPT
PostUp = iptables -I FORWARD 2 -i %i -o %i -s 192.168.88.0/24 -d 172.22.0.0/24 -j ACCEPT
PostUp = iptables -I FORWARD 3 -i %i -o %i -s 10.13.14.3/32 -j ACCEPT
PostUp = iptables -I FORWARD 4 -i %i -o %i -d 10.13.14.3/32 -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT

PostDown = iptables -D FORWARD -i %i -o %i -s 172.22.0.0/24 -d 192.168.88.0/24 -j ACCEPT 2>/dev/null || true
PostDown = iptables -D FORWARD -i %i -o %i -s 192.168.88.0/24 -d 172.22.0.0/24 -j ACCEPT 2>/dev/null || true
PostDown = iptables -D FORWARD -i %i -o %i -s 10.13.14.3/32 -j ACCEPT 2>/dev/null || true
PostDown = iptables -D FORWARD -i %i -o %i -d 10.13.14.3/32 -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT 2>/dev/null || true

