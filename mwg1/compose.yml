name: mwg
services:
  mwg1_srv:
    container_name: mwg1
    build:
      context: .
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - 51830:51830/udp
    networks:
      mynet:
        ipv4_address: 172.21.0.14
    tty: true
    restart: always

networks:
  mynet:
    name: mynet
    driver: bridge
    ipam:
      config:
      - subnet: 172.21.0.0/24
        gateway: 172.21.0.1